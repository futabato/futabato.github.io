# 手動キュレーション: 気になった記事のURLをここに追加
# GitHub Actions実行時に自動でfetch → 要約 → RSSに含まれます
#
# 使い方:
#   1. URLとメモを追加してcommit & push
#   2. 次回のGitHub Actions実行時に処理される
#   3. 処理済みのエントリは自動で consumed: true に更新される
#
# モバイルからの追加:
#   - GitHub Issueに「pick: URL」と書くだけでもOK
#   - またはこのファイルをGitHub Web UIから直接編集

